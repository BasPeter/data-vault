name: Test and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build

  package:
    name: Package for ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: data-vault-linux
          - name: macOS
            os: macos-latest
            artifact: data-vault-macos
          - name: Windows
            os: windows-latest
            artifact: data-vault-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: data-vault-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
          fi
          mapfile -d '' assets < <(find release-assets -type f -print0)
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
